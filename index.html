            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 0 #004666, 0 15px 25px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
        }

        .bubbly-btn:hover {
            transform: translateY(-5px);
            background-color: #027cb3;
            box-shadow: 0 15px 0 #004666, 0 20px 30px rgba(0,0,0,0.5);

        .bubbly-btn:active {
            transform: translateY(6px);

        }

            border-radius: 40px;

            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;

            color: #d4af37;
            margin-bottom: 40px;
            text-shadow: 0 3px 6px rgba(0,0,0,0.4);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

            0% { transform: scale(0); opacity: 0; }

        .speech-bubble {
            background: #016795;
            color: #d4af37;
            font-size: 1.8rem;

        }

        /* --- SURPRISE TWO: MASSIVE 3-LAYER CAKE & FLAIR EXTINGUISH --- */
        .cake-wrapper {
            position: relative;
            display: inline-block;
            margin: 100px auto 40px auto;
            transform: scale(2.5); /* Massive Cake Assembly */
        }

        /* Large Striped Pixel Candle */
        .candle {
            width: 14px;
            height: 45px;
            background: linear-gradient(to bottom, #d4af37 50%, #016795 50%);
            background-size: 100% 16px;
            position: relative;
            margin: 0 auto;
            top: 2px;
            z-index: 2;
        }

        .wick {
            width: 2px;
            height: 8px;
            background-color: #222;
            position: absolute;
            top: -8px;
            left: 6px;
        }

        .flame {
            width: 14px;
            height: 24px;
            background: radial-gradient(ellipse at bottom, #ff8c00 30%, #d4af37 70%, transparent 90%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -32px;
            left: 0px;
            box-shadow: 0 0 25px rgba(212,175,55,1);
            animation: flicker 0.4s ease-in-out infinite alternate;
            transition: all 0.3s ease;
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.2) rotate(3deg); }
        }

        .flame.blown-out {
            opacity: 0;
            transform: scale(0);
        }

        /* Pixel Smoke Clouds Effect */
        .smoke-puff {
            display: none;
            position: absolute;
            width: 10px;
            height: 10px;
            background: transparent;
            top: -45px;
            left: -15px;
            z-index: 5;
        }

        /* Cute pixelated puffs of smoke expanding outwards */
        .smoke-puff.active {
            display: block;
            box-shadow: 
                -10px -10px #bbb, 0px -15px #ddd, 10px -10px #bbb,
                -20px 0px #999, 20px 0px #999,
                -10px 10px #bbb, 0px 15px #bbb, 10px 10px #bbb;
            animation: smokeDissolve 0.8s ease-out forwards;
        }

        @keyframes smokeDissolve {
            0% { transform: scale(0.4) translateY(0); opacity: 1; }
            50% { transform: scale(1.4) translateY(-15px); opacity: 0.8; }
            100% { transform: scale(2) translateY(-35px); opacity: 0; }
        }
