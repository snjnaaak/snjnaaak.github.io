<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday, Dad!</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f7ebe1; /* Warm, pleasant light background */
            text-align: center;
            padding: 40px 20px;
            color: #333;
        }

        h1 {
            color: #016795; /* Peacock Blue */
            font-size: 3.5rem;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .subtitle {
            font-size: 1.3rem;
            color: #d4af37; /* Metallic Gold */
            font-weight: bold;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- BUBBLY BUTTONS MENU --- */
        .menu-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto 40px auto;
            flex-wrap: wrap;
        }

        .bubbly-btn {
            background-color: #016795;
            color: #d4af37;
            border: 3px solid #d4af37;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px; /* Makes it bubbly/round */
            cursor: pointer;
            box-shadow: 0 6px 0 #014d70, 0 8px 15px rgba(0,0,0,0.2);
            transition: all 0.1s ease;
        }

        .bubbly-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #014d70, 0 10px 20px rgba(0,0,0,0.2);
            background-color: #027cb3;
        }

        .bubbly-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #014d70, 0 4px 6px rgba(0,0,0,0.2);
        }

        /* --- SURPRISE SECTIONS --- */
        .surprise-section {
            display: none; /* Hidden by default until clicked */
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 4px solid #016795;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- OPTION 1: PIXEL GIFT & PEACOCK --- */
        .gift-container {
            cursor: pointer;
            display: inline-block;
            margin-top: 20px;
        }

        /* Pixel Gift Box */
        .pixel-gift {
            width: 8px;
            height: 8px;
            background: transparent;
            margin: 0 auto;
            box-shadow: 
                -16px 0px #d4af37, -8px 0px #016795, 0px 0px #d4af37, 8px 0px #016795, 16px 0px #d4af37,
                -16px 8px #d4af37, -8px 8px #016795, 0px 8px #d4af37, 8px 8px #016795, 16px 8px #d4af37,
                -16px 16px #016795, -8px 16px #016795, 0px 16px #d4af37, 8px 16px #016795, 16px 16px #016795,
                -16px 24px #016795, -8px 24px #016795, 0px 24px #d4af37, 8px 24px #016795, 16px 24px #016795;
            transition: transform 0.2s ease;
        }

        .gift-container:hover .pixel-gift {
            transform: scale(1.1);
        }

        /* Jump-out Pixel Peacock */
        .peacock-pop {
            display: none;
            animation: jumpUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            margin-top: -20px;
        }

        @keyframes jumpUp {
            0% { transform: translateY(50px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .pixel-peacock {
            width: 6px;
            height: 6px;
            background: transparent;
            margin: 0 auto;
            box-shadow: 
                -18px -12px #d4af37, -12px -18px #016795, 0px -24px #d4af37, 12px -18px #016795, 18px -12px #d4af37,
                -24px 0px #016795, -18px -6px #016795, 18px -6px #016795, 24px 0px #016795,
                -18px 6px #d4af37, 18px 6px #d4af37,
                -6px -6px #016795, 0px -6px #016795, 6px -6px #016795,
                -6px 0px #016795, 0px 0px #016795, 6px 0px #016795,
                -6px 6px #016795, 0px 6px #016795, 6px 6px #016795,
                -6px 12px #016795, 0px 12px #016795, 6px 12px #016795,
                -3px -12px #016795, 3px -12px #016795,
                -3px -18px #016795, 3px -18px #016795,
                9px -15px #d4af37, 0px -15px #333,
                -6px 18px #d4af37, 6px 18px #d4af37,
                -6px 24px #d4af37, 6px 24px #d4af37;
        }

        .speech-bubble {
            background: #016795;
            color: #d4af37;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 12px;
            margin-top: 35px;
            display: inline-block;
            border: 2px solid #d4af37;
        }

        /* --- OPTION 2: CANDLE CAKE & BIG BUTTON --- */
        .cake-graphic {
            width: 8px;
            height: 8px;
            background: transparent;
            margin: 40px auto 10px auto;
            box-shadow: 
                -24px 0px #016795, -16px 0px #d4af37, -8px 0px #016795, 0px 0px #d4af37, 8px 0px #016795, 16px 0px #d4af37, 24px 0px #016795,
                -24px 8px #016795, -16px 8px #d4af37, -8px 8px #016795, 0px 8px #d4af37, 8px 8px #016795, 16px 8px #d4af37, 24px 8px #016795;
        }

        .candle {
            width: 12px;
            height: 40px;
            background: linear-gradient(to bottom, #016795, #d4af37);
            border-radius: 2px;
            position: relative;
            margin: 0 auto;
        }

        .wick {
            width: 2px;
            height: 8px;
            background-color: #333;
            position: absolute;
            top: -8px;
            left: 5px;
        }

        .flame {
            width: 12px;
            height: 20px;
            background: radial-gradient(ellipse at bottom, #f39c12 30%, #d4af37 60%, transparent 90%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -28px;
            left: 0px;
            box-shadow: 0 0 20px rgba(212,175,55,0.9);
            animation: flicker 0.6s ease-in-out infinite alternate;
            transition: opacity 0.3s ease;
        }

        @keyframes flicker {
            0% { transform: scale(1); }
            100% { transform: scale(1.1) rotate(2deg); }
        }

        .flame.blown-out {
            opacity: 0;
            animation: none;
            box-shadow: none;
        }

        .big-action-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 30px;
            box-shadow: 0 5px 0 #cc5252;
        }

        .big-action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #cc5252;
        }

        /* --- OPTION 3: VIDEO LINK --- */
        .video-box {
            padding: 20px;
        }
        
        .video-placeholder {
            width: 100%;
            height: 300px;
            background-color: #eee;
            border: 3px dashed #b5b5b5;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: #777;
        }

    </style>
</head>
<body>

    <h1>Happy Birthday, Dad! 🎉</h1>
    <p class="subtitle">Your special birthday surprises await!</p>

    <div class="menu-container">
        <button class="bubbly-btn" onclick="showSurprise('gift-section')">🎁 Birthday Gift</button>
        <button class="bubbly-btn" onclick="showSurprise('cake-section')">🎂 Birthday Cake</button>
        <button class="bubbly-btn" onclick="showSurprise('video-section')">📺 Special Video</button>
    </div>

    <div id="gift-section" class="surprise-section">
        <h2>Click the gift box to open it!</h2>
        <div class="gift-container" id="gift-box-wrapper" onclick="openGift()">
            <div class="pixel-gift"></div>
        </div>
        
        <div class="peacock-pop" id="peacock-gift">
            <div class="pixel-peacock"></div>
            <br>
            <div class="speech-bubble">🦚 "Surprise! Happy Birthday to the world's best Dad!"</div>
        </div>
    </div>

    <div id="cake-section" class="surprise-section">
        <h2>Make a wish, Dad!</h2>
        <div style="margin-top: 50px;">
            <div class="candle">
                <div class="wick"></div>
                <div id="cake-flame" class="flame"></div>
            </div>
            <div class="cake-graphic"></div>
        </div>
        <button class="big-action-btn" onclick="blowOutCandle()">CLICK AND BLOW! 🌬️</button>
    </div>

    <div id="video-section" class="surprise-section">
        <h2>A Special Message For You ❤️</h2>
        <div class="video-box">
            <div class="video-placeholder">
                <p>✨ [Paste your Canva Video Embed Code or Link right here later!] ✨</p>
            </div>
        </div>
    </div>

    <script>
        // Tab system to switch sections
        function showSurprise(sectionId) {
            // Hide all sections first
            document.querySelectorAll('.surprise-section').forEach(section => {
                section.style.display = 'none';
            });
            // Show the clicked section
            document.getElementById(sectionId).style.display = 'block';
        }

        // Gift interaction
        function openGift() {
            document.getElementById('gift-box-wrapper').style.display = 'none';
            document.getElementById('peacock-pop-audio'); // can link sound later if wanted
            document.getElementById('peacock-gift').style.display = 'block';
        }

        // Candle interaction
        function blowOutCandle() {
            const flame = document.getElementById('cake-flame');
            flame.classList.toggle('blown-out');
        }
    </script>

</body>
</html>
