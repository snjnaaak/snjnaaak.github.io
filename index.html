            font-size: 1.8rem;            
            font-weight: bold;            
            font-family: 'Arial Black', sans-serif;            
            border-radius: 50px;

            box-shadow: 0 10px 0 #004666, 0 15px 25px rgba(0,0,0,0.4);            
            transition: all 0.1s ease;        
        }

            transform: translateY(-5px);            
            background-color: #027cb3;            
            box-shadow: 0 15px 0 #004666, 0 20px 30px rgba(0,0,0,0.5);
