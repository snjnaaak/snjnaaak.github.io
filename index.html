<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday, Dad!</title>
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            font-family: 'Arial Black', 'Arial', sans-serif;
            background-color: #002b3d; /* Dark Peacock Blue */
            text-align: center;
            padding: 50px 20px;
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }

        /* Large Bubbly Gold Title */
        h1 {
            color: #d4af37; /* Gold */
            font-size: 4.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 4px 0 #997d25,
                0 8px 0 #665319,
                0 12px 20px rgba(0,0,0,0.6);
            animation: bounce Title 2s infinite alternate;
        }

        .subtitle {
            font-size: 1.5rem;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 50px;
            letter-spacing: 1px;
            opacity: 0.9;
        }

        /* --- BUBBLY BUTTONS MENU --- */
        .menu-container {
            display: flex;
            justify-content: center;
            gap: 25px;
            max-width: 900px;
            margin: 0 auto 50px auto;
            flex-wrap: wrap;
        }

        .bubbly-btn {
            background-color: #016795; /* Blue Boxes */
            color: #d4af37; /* Gold Text */
            border: 4px solid #d4af37; /* Gold Outline */
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #004666, 0 12px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
        }

        .bubbly-btn:hover {
            transform: translateY(-4px);
            background-color: #027cb3;
            box-shadow: 0 12px 0 #004666, 0 16px 25px rgba(0,0,0,0.5);
        }

        .bubbly-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #004666, 0 4px 10px rgba(0,0,0,0.4);
        }

        /* --- SURPRISE SECTIONS --- */
        .surprise-section {
            display: none;
            max-width: 750px;
            margin: 30px auto;
            background: #01415e; /* Darker Blue Container Box */
            padding: 50px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 5px solid #d4af37; /* Gold Outline */
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .surprise-section h2 {
            font-size: 2.2rem;
            color: #d4af37;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8) translateY(30px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- LARGER RETRO PIXEL ARTWORKS --- */
        
        /* Huge Gift Box */
        .gift-container {
            cursor: pointer;
            display: inline-block;
            margin: 20px auto;
        }

        .pixel-gift {
            width: 14px;
            height: 14px;
            background: transparent;
            margin: 0 auto;
            box-shadow: 
                -28px 0px #d4af37, -14px 0px #016795, 0px 0px #d4af37, 14px 0px #016795, 28px 0px #d4af37,
                -28px 14px #d4af37, -14px 14px #016795, 0px 14px #d4af37, 14px 14px #016795, 28px 14px #d4af37,
                -28px 28px #016795, -14px 28px #016795, 0px 28px #d4af37, 14px 28px #016795, 28px 28px #016795,
                -28px 42px #016795, -14px 42px #016795, 0px 42px #d4af37, 14px 42px #016795, 28px 42px #016795;
            transition: transform 0.2s ease;
        }

        .gift-container:hover .pixel-gift {
            transform: scale(1.15) rotate(3deg);
        }

        /* Massive Jump-out Pixel Peacock */
        .peacock-pop {
            display: none;
            animation: jumpUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes jumpUp {
            0% { transform: translateY(100px) scale(0); opacity: 0; }
            100% { transform: translateY(0) scale(1.4); opacity: 1; }
        }

        .pixel-peacock {
            width: 10px;
            height: 10px;
            background: transparent;
            margin: 40px auto;
            box-shadow: 
                /* Majestic Crest & Fan Crown */
                -30px -40px #d4af37, 0px -50px #d4af37, 30px -40px #d4af37,
                -20px -30px #016795, 0px -40px #016795, 20px -30px #016795,
                /* Massive Golden Wings & Tail Plumes */
                -50px -10px #d4af37, -40px -20px #016795, 40px -20px #016795, 50px -10px #d4af37,
                -60px 10px #016795, -40px 0px #016795, 40px 0px #016795, 60px 10px #016795,
                -50px 20px #d4af37, -30px 10px #d4af37, 30px 10px #d4af37, 50px 20px #d4af37,
                /* Deep Royal Blue Body/Neck */
                -10px -20px #016795, 0px -20px #016795, 10px -20px #016795,
                -10px -10px #016795, 0px -10px #016795, 10px -10px #016795,
                -10px 0px #016795, 0px 0px #016795, 10px 0px #016795,
                -10px 10px #016795, 0px 10px #016795, 10px 10px #016795,
                -10px 20px #016795, 0px 20px #016795, 10px 20px #016795,
                /* Head Elements */
                -5px -30px #016795, 5px -30px #016795,
                15px -25px #d4af37, /* Gold Beak */
                0px -25px #111,     /* Eye */
                /* Tall Golden Legs */
                -10px 30px #d4af37, 10px 30px #d4af37,
                -10px 40px #d4af37, 10px 40px #d4af37,
                -20px 45px #d4af37, 20px 45px #d4af37;
        }

        .speech-bubble {
            background: #016795;
            color: #d4af37;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 20px;
            margin-top: 50px;
            display: inline-block;
            border: 4px solid #d4af37;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        /* --- OPTION 2: DARK CHOCOLATE CAKE & BLOW --- */
        .cake-wrapper {
            position: relative;
            display: inline-block;
            margin: 80px auto 40px auto;
            transform: scale(1.5); /* Makes the whole cake area massive */
        }

        /* Large Striped Pixel Candle */
        .candle {
            width: 20px;
            height: 55px;
            background: linear-gradient(to bottom, #d4af37 50%, #016795 50%);
            background-size: 100% 20px;
            position: relative;
            margin: 0 auto;
            top: 2px;
            z-index: 2;
        }

        .wick {
            width: 3px;
            height: 10px;
            background-color: #222;
            position: absolute;
            top: -10px;
            left: 9px;
        }

        .flame {
            width: 20px;
            height: 32px;
            background: radial-gradient(ellipse at bottom, #ff8c00 30%, #d4af37 70%, transparent 90%);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -42px;
            left: 0px;
            box-shadow: 0 0 30px rgba(212,175,55,1);
            animation: flicker 0.5s ease-in-out infinite alternate;
            transition: all 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }

        @keyframes flicker {
            0% { transform: scale(1) rotate(-1deg); }
            100% { transform: scale(1.15) rotate(2deg); }
        }

        /* Dramatic Extinguish Animations */
        .flame.blown-out {
            transform: scale(0.1) translateY(-40px) skewX(-30deg);
            opacity: 0;
            box-shadow: none;
        }

        /* Giant Chocolate Pixel Cake */
        .pixel-chocolate-cake {
            width: 12px;
            height: 12px;
            background: transparent;
            margin: 0 auto;
            box-shadow: 
                /* Cream topping layer */
                -36px 0px #fff, -24px 0px #fff, -12px 0px #fff, 0px 0px #fff, 12px 0px #fff, 24px 0px #fff, 36px 0px #fff,
                /* Dark Chocolate body sponge */
                -36px 12px #4a2c11, -24px 12px #4a2c11, -12px 12px #4a2c11, 0px 12px #4a2c11, 12px 12px #4a2c11, 24px 12px #4a2c11, 36px 12px #4a2c11,
                -36px 24px #4a2c11, -24px 24px #4a2c11, -12px 24px #3d230d, 0px 24px #3d230d, 12px 24px #3d230d, 24px 24px #4a2c11, 36px 24px #4a2c11,
                /* Gold Plate/Base */
                -48px 36px #d4af37, -36px 36px #d4af37, -24px 36px #d4af37, -12px 36px #d4af37, 0px 36px #d4af37, 12px 36px #d4af37, 24px 36px #d4af37, 36px 36px #d4af37, 48px 36px #d4af37;
        }

        /* Giant Dramatic Countdown overlay */
        .countdown-text {
            display: none;
            font-size: 8rem;
            color: #ff6b6b;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 30px rgba(255,107,107,0.6);
            margin: 20px 0;
            animation: pulseCount 0.8s infinite alternate;
        }

        @keyframes pulseCount {
            0% { transform: scale(0.9); opacity: 0.7; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .big-action-btn {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 22px 60px;
            font-size: 1.8rem;
            font-weight: bold;
            font-family: 'Arial Black', sans-serif;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 50px;
            box-shadow: 0 8px 0 #cc5252, 0 10px 20px rgba(0,0,0,0.3);
            transition: all 0.1s ease;
        }

        .big-action-btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #cc5252;
        }

        /* --- OPTION 3: VIDEO --- */
        .video-box {
            padding: 10px;
        }
        
        .video-placeholder {
            width: 100%;
            height: 350px;
            background-color: #002b3d;
            border: 4px dashed #d4af37;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            color: #d4af37;
            font-size: 1.3rem;
        }

        @keyframes bounceTitle {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }
    </style>
</head>
<body>

    <h1>Happy Birthday, Dad! 🎉</h1>
    <p class="subtitle">Your premium birthday surprises await</p>

    <div class="menu-container">
        <button class="bubbly-btn" onclick="showSurprise('gift-section')">🎁 Birthday Gift</button>
        <button class="bubbly-btn" onclick="showSurprise('cake-section')">🎂 Birthday Cake</button>
        <button class="bubbly-btn" onclick="showSurprise('video-section')">📺 Special Video</button>
    </div>

    <div id="gift-section" class="surprise-section">
        <h2>Click the gift box to open it!</h2>
        <div class="gift-container" id="gift-box-wrapper" onclick="openGift()">
            <div class="pixel-gift"></div>
        </div>
        
        <div class="peacock-pop" id="peacock-gift">
            <div class="pixel-peacock"></div>
            <br>
            <div class="speech-bubble">🦚 "Surprise! Happy Birthday to the absolute best Dad in the world!"</div>
        </div>
    </div>

    <div id="cake-section" class="surprise-section">
        <h2>Get ready to make a wish!</h2>
        
        <div class="cake-wrapper">
            <div class="candle">
                <div class="wick"></div>
                <div id="cake-flame" class="flame"></div>
            </div>
            <div class="pixel-chocolate-cake"></div>
        </div>

        <div id="countdown-display" class="countdown-text">3</div>

        <br>
        <button id="blow-btn" class="big-action-btn" onclick="startDramaticBlow()">CLICK AND BLOW! 🌬️</button>
    </div>

    <div id="video-section" class="surprise-section">
        <h2>A Special Message For You ❤️</h2>
        <div class="video-box">
            <div class="video-placeholder">
                <p>✨ [Paste your Canva Video Embed Link here later!] ✨</p>
            </div>
        </div>
    </div>

    <script>
        // Smoothly switch between different surprise panels
        function showSurprise(sectionId) {
            document.querySelectorAll('.surprise-section').forEach(section => {
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'block';
        }

        // Handles the gift box click event and scaling pop animation
        function openGift() {
            document.getElementById('gift-box-wrapper').style.display = 'none';
            document.getElementById('peacock-gift').style.display = 'block';
        }

        // Handles the 3... 2... 1... slow structural countdown then dynamic extinguish
        function startDramaticBlow() {
            const countdownEl = document.getElementById('countdown-display');
            const blowBtn = document.getElementById('blow-btn');
            const flame = document.getElementById('cake-flame');
            
            // Hide the button and reset the flame status if it was blown out before
            blowBtn.style.visibility = 'hidden';
            flame.classList.remove('blown-out');
            
            let currentCount = 3;
            countdownEl.innerText = currentCount;
            countdownEl.style.display = 'block';

            // Slow interval sequence loop counting down seconds
            const interval = setInterval(() => {
                currentCount--;
                if (currentCount > 0) {
                    countdownEl.innerText = currentCount;
                } else if (currentCount === 0) {
                    countdownEl.innerText = "BLOW! 💨";
                } else {
                    clearInterval(interval);
                    countdownEl.style.display = 'none';
                    
                    // The Dramatic Extinguish Action
                    flame.classList.add('blown-out');
                    
                    // Show the operation button again after completion
                    setTimeout(() => {
                        blowBtn.style.visibility = 'visible';
                        blowBtn.innerText = "LIGHT AGAIN? 🔄";
                    }, 1200);
                }
            }, 1000); // 1000 milliseconds = 1 slow second per count
        }
    </script>

</body>
</html>
