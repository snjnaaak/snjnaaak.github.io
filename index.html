<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Appa!</title>
    <style>
        /* --- GLOBAL ENVIRONMENT --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000c14;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Large Bubble Gold Lettering */
        .bubble-heading {
            font-size: 4.5rem;
            font-family: 'Arial Black', Impact, sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 15px 0;
            display: inline-block;
            background: linear-gradient(to bottom, #ffe066 0%, #f39c12 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 0px #000) drop-shadow(-1px -1px 1px #fff);
            animation: floatBubble 3s ease-in-out infinite alternate;
        }

        @keyframes floatBubble {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-8px) scale(1.03); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ffe066;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 10;
        }

        /* --- FLOATING BALLOON BACKGROUND --- */
        .balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 0.35;
            animation: floatUp 12s linear infinite;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 24px;
            width: 2px; height: 12px;
            background-color: rgba(255, 255, 255, 0.4);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-50vh) translateX(25px); }
            100% { transform: translateY(-120vh) translateX(-10px); }
        }

        /* --- UPDATED MENU LEVEL GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); /* Made wider */
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto 50px auto;
            position: relative;
            z-index: 10;
        }

        /* Bigger, more rounded options boxes with a golden outline */
        .menu-card {
            background-color: #012233;
            border: 5px solid #d4af37; /* Thick Golden Outline */
            border-radius: 20px;       /* Heavily Rounded Corners */
            padding: 35px 20px;        /* Increased Padding for size */
            cursor: pointer;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.6);
            transition: all 0.2s ease-in-out;
        }

        .menu-card:hover {
            background-color: #01415e;
            border-color: #ffe066;     /* Brighter Gold on hover */
            transform: translateY(-8px);
            box-shadow: 0px 12px 24px rgba(212, 175, 55, 0.3);
        }

        .menu-card:active {
            transform: translateY(2px);
        }

        .card-icon { font-size: 3.5rem; margin-bottom: 15px; } /* Bigger Icons */
        .card-title { font-size: 1.3rem; font-weight: bold; text-transform: uppercase; color: #fff; }
        .level-tag { font-size: 0.9rem; color: #ffe066; margin-top: 10px; display: block; letter-spacing: 1px; }

        /* --- STAGE DISPLAY MONITOR PANEL --- */
        .stage-panel {
            display: none;
            max-width: 750px;
            margin: 40px auto;
            background-color: #00121c;
            border: 4px solid #fff;
            box-shadow: 12px 12px 0px #000;
            padding: 40px;
            position: relative;
            min-height: 480px;
            overflow: hidden;
            z-index: 20;
        }

        .animate-pop { animation: pixelPop 0.25s steps(3) forwards; }
        @keyframes pixelPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .action-btn {
            background: #ff4d4d;
            color: #fff;
            border: 3px solid #fff;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
            margin-top: 25px;
            font-family: inherit;
        }
        .action-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px #000;
        }

        /* --- LEVEL 1: PIXEL GIFT BOX & PEACOCK LAUNCH --- */

            display: flex;

            align-items: flex-end;

        .pixel-gift-container {

            height: 140px;
            position: relative;
            cursor: pointer;

            margin-bottom: 20px;
            z-index: 12;

        .gift-base {
            width: 120px;
            height: 100px;
            background: #ff4d4d;
            border: 4px solid #fff;
            position: absolute;
            bottom: 0;
            left: 6px;
            box-shadow: inset -15px 0px 0px rgba(0,0,0,0.15), 5px 5px 0px #000;
        }

        .gift-base::before, .gift-lid::before {
            content: ''; position: absolute; top: 0; left: 45px;
            width: 26px; height: 100%; background: #ffe066;
            border-left: 4px solid #fff; border-right: 4px solid #fff;
        }

        .gift-lid {
            width: 140px;
            height: 32px;
            background: #ff4d4d;
            border: 4px solid #fff;
            position: absolute;
            top: 0;
            left: -4px;
            box-shadow: inset -15px 0px 0px rgba(0,0,0,0.15), 4px 4px 0px #000;
            z-index: 14;
        }

        .lid-exploded {
            animation: lidFlyOff 0.7s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
        }
        @keyframes lidFlyOff {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            30% { transform: translateY(-90px) rotate(-20deg); opacity: 1; }
            100% { transform: translateY(200px) translateX(-180px) rotate(-110deg); opacity: 0; }
        }

        .peacock-launch {
            display: block;

        @keyframes smoothJump {
            0% { bottom: 20px; transform: translateX(-50%) scale(0.2); }
            100% { bottom: 150px; transform: translateX(-50%) scale(1.4); }
        }

        .speech-bubble {
            display: none;
            position: absolute;
            bottom: 230px;

            box-shadow: 4px 4px 0px #00ffcc; border-radius: 12px;
            white-space: nowrap;
            z-index: 15;
        }
        .speech-bubble::after {
            content: ''; position: absolute; bottom: 16px; left: -16px;
            border-width: 8px; border-style: solid;
            border-color: transparent #ffffff transparent transparent;
        }

            height: 250px;
            width: 260px;
            display: flex;
            flex-direction: column;

            justify-content: flex-end;
        }
