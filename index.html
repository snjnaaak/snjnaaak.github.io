<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Appa!</title>
    <style>
        /* --- GLOBAL ENVIRONMENT --- */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000c14;
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Large Bubble Gold Lettering */
        .bubble-heading {
            font-size: 4.5rem;
            font-family: 'Arial Black', Impact, sans-serif;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 1px;
            margin: 15px 0;
            display: inline-block;
            background: linear-gradient(to bottom, #ffe066 0%, #f39c12 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 0px #000) drop-shadow(-1px -1px 1px #fff);
            animation: floatBubble 3s ease-in-out infinite alternate;
        }

        @keyframes floatBubble {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(-8px) scale(1.03); }
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ffe066;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- FLOATING BALLOON BACKGROUND --- */
        .balloon-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 0.35;
            animation: floatUp 12s linear infinite;
        }

        /* Small string at the bottom of each balloon */
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -12px; left: 24px;
            width: 2px; height: 12px;
            background-color: rgba(255, 255, 255, 0.4);
        }

        @keyframes floatUp {
            0% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-50vh) translateX(25px); }
            100% { transform: translateY(-120vh) translateX(-10px); }
        }

        /* --- MENU LEVEL GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto 50px auto;
            position: relative;
            z-index: 10;
        }

        .menu-card {
            background-color: #012233;
            border: 4px solid #00ffcc;
            padding: 25px 15px;
            cursor: pointer;
            box-shadow: 6px 6px 0px #000;
            transition: all 0.1s ease;
        }

        .menu-card:hover {
            background-color: #01415e;
            border-color: #ffe066;
